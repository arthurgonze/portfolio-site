<!doctype html>
<html lang="en">
  <head>
    <meta
      property="og:title"
      content="Arthur Gonze Machado - Tech Artist Portfolio"
    />
    <meta
      property="og:description"
      content="Shader programming, CFD simulations, and graphics experiments"
    />
    <meta
      property="og:image"
      content="https://placehold.co/480x200/550000/white?text=Arthur+Gonze+Machado"
    />
    <meta
      property="og:url"
      content="https://arthurgonze.github.io/portfolio-site/index.html"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arthur – Portfolio</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/home.css" />

    <!-- Import map for module resolution -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
          "three/addons/Stats": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/libs/stats.module.js"
        }
      }
    </script>
  </head>

  <body>
    <!-- Three.js background canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Header & theme-switcher injected here -->
    <header class="main-header"></header>

    <!-- Main content + welcome panel -->
    <main>
      <section class="welcome-section container">
        <div class="welcome-panel" id="welcomePanel">
          <button
            class="panel-toggle"
            id="toggleBtn"
            aria-label="Toggle welcome panel"
          >
            -
          </button>
          <h1>Welcome!</h1>
          <p>
            I'm Arthur, a Tech Artist specialized in Computational Fluid
            Dynamics (but a generalist by heart). This site showcases some of my
            work and experiments. Feel free to explore!
          </p>
          <div class="links">
            <a
              href="https://www.linkedin.com/in/arthur-gonze-machado-890715177/"
              target="_blank"
              >LinkedIn</a
            >
            <a href="https://github.com/arthurgonze" target="_blank">GitHub</a>
          </div>
        </div>
      </section>
    </main>

    <footer></footer>

    <!-- Load header/footer, then kick off main.js -->
    <script type="module">
      import { loadHeaderAndFooter } from "./js/htmlLoader.js";
      import { setupHeaderLinks } from "./js/components.js";
      import { BASE_PATH } from "./js/config.js";

      try {
        await loadHeaderAndFooter(BASE_PATH);
        await setupHeaderLinks();
        await import("./js/main.js");
      } catch (err) {
        console.error(err);
      }

      // Panel toggle
      const panel = document.getElementById("welcomePanel");
      const btn = document.getElementById("toggleBtn");
      btn.addEventListener("click", () => {
        const collapsed = panel.classList.toggle("collapsed");
        btn.textContent = collapsed ? "+" : "−";
      });
    </script>
  </body>
</html>
