<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects – Arthur Gonze Machado</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/projects-list.css" />

    <!-- Import map for module resolution -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
          "three/addons/Stats": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/libs/stats.module.js"
        }
      }
    </script>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <header class="main-header"></header>

    <main class="projects-main">
      <div class="container">
        <div class="project-filters">
          <input
            type="text"
            id="project-search"
            placeholder="Search by name…"
            aria-label="Search projects by name"
          />
          <select id="project-filter-date" aria-label="Filter projects by date">
            <option value="all">All Dates</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
          </select>
        </div>

        <div class="project-grid">
          <div
            class="project-item"
            data-project-name="Cool Shader Effect"
            data-project-date="2025-03-20"
          >
            <a id="shader-20250320">
              <img
                src="https://placehold.co/300x200/00aaff/white?text=Shader+FX"
                alt="Cool Shader Effect Thumbnail"
              />
              <h3>Cool Shader Effect</h3>
              <p>
                A short description of this amazing shader project goes here.
              </p>
            </a>
          </div>
          <div
            class="project-item"
            data-project-name="Interactive Unreal Scene"
            data-project-date="2025-02-10"
          >
            <a id="unreal-20250210">
              <img
                src="https://placehold.co/300x200/7700ff/white?text=Unreal+Scene"
                alt="Interactive Unreal Scene Thumbnail"
              />
              <h3>Interactive Unreal Scene</h3>
              <p>
                Brief overview of the Unreal Engine project and its features.
              </p>
            </a>
          </div>
          <div
            class="project-item"
            data-project-name="WebVR Experiment"
            data-project-date="2026-01-05"
          >
            <a id="vr-20260105">
              <img
                src="https://placehold.co/300x200/ff9900/white?text=WebVR+Exp"
                alt="WebVR Experiment Thumbnail"
              />
              <h3>WebVR Experiment</h3>
              <p>
                Exploring virtual reality interactions directly in the web
                browser.
              </p>
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer></footer>

    <script type="module">
      import {
        loadHeaderAndFooter,
        setupHeaderLinks,
        setupProjectLinks,
      } from "./js/components.js";

      try {
        await loadHeaderAndFooter();
        await setupHeaderLinks();
        await setupProjectLinks();
        await import("./js/main.js");
        await import("./js/projects.js");
      } catch (err) {
        console.error(err);
      }
    </script>
  </body>
</html>
