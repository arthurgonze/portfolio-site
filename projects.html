<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects – Arthur Gonze Machado</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/projects-list.css" />

    <!-- Import map for module resolution -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
          "three/addons/Stats": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/libs/stats.module.js"
        }
      }
    </script>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <header class="main-header"></header>

    <main class="projects-main">
      <div class="container">
        <div class="project-filters">
          <input
            type="text"
            id="project-search"
            placeholder="Search by name…"
            aria-label="Search projects by name"
          />
          <select id="project-filter-date" aria-label="Filter projects by date">
            <option value="all">All Dates</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
          </select>
        </div>

        <div class="project-grid"></div>
      </div>
    </main>

    <footer></footer>

    <script type="module">
      import { loadHeaderAndFooter } from "./js/htmlLoader.js";
      import { setupHeaderLinks, setupProjectLinks } from "./js/components.js";
      import { BASE_PATH } from "./js/config.js";
      try {
        await loadHeaderAndFooter(BASE_PATH);
        await setupHeaderLinks();
        await setupProjectLinks();
        await import("./js/main.js");
        await import("./js/projects.js");
      } catch (err) {
        console.error(err);
      }
    </script>
  </body>
</html>
