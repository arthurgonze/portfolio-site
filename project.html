<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project – Arthur Gonze Machado</title>

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/project-detail.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
          "three/addons/Stats": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/libs/stats.module.js"
        }
      }
    </script>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>

    <header class="main-header"></header>

    <main class="project-detail-main">
      <div class="container" id="project-detail-root" aria-live="polite">
        <p class="project-status">Loading project...</p>
      </div>
    </main>

    <footer></footer>

    <script type="module">
      import { loadHeaderAndFooter } from "./js/htmlLoader.js";
      import { setupHeaderLinks } from "./js/components.js";
      import { ProjectDetailPage } from "./js/projects/ProjectDetailPage.js";
      import { BASE_PATH } from "./js/config.js";

      try {
        await loadHeaderAndFooter(BASE_PATH);
        await setupHeaderLinks();
        await import("./js/main.js");
        const projectDetailPage = new ProjectDetailPage();
        await projectDetailPage.init();
      } catch (err) {
        console.error(err);
      }
    </script>
  </body>
</html>
